<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A-Payy | Merchant Dashboard</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex items-start justify-center font-sans py-10 px-4">

    <!-- LOGIN VIEW -->
    <div id="loginView" class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-8 border border-slate-200 mt-20">
        <h1 class="text-2xl font-bold text-slate-800 mb-1">A-Payy</h1>
        <p class="text-sm text-slate-500 mb-6">Merchant Login</p>

        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input id="emailInput" type="email" class="w-full mb-3 px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input id="passwordInput" type="password" class="w-full mb-4 px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

        <button id="loginBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
            Log In
        </button>

        <p id="loginError" class="mt-3 text-sm text-red-600 hidden"></p>
    </div>

    <!-- DASHBOARD VIEW (hidden until logged in) -->
    <div id="dashboardView" class="hidden w-full max-w-2xl flex flex-col gap-6">

        <!-- Session creation card -->
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-200">
            <div class="flex justify-between items-start mb-1">
                <h1 class="text-2xl font-bold text-slate-800">A-Payy</h1>
                <button id="logoutBtn" class="text-xs text-slate-400 hover:text-slate-600 underline">Log out</button>
            </div>
            <p class="text-sm text-slate-500 mb-6">Tap-to-Pay Session</p>

            <label class="block text-sm font-medium text-slate-700 mb-1">Amount (ZAR)</label>
            <div class="relative mb-4">
                <span class="absolute left-3 top-2.5 text-slate-400">R</span>
                <input id="amountInput" type="number" min="1" step="0.01" placeholder="0.00"
                class="w-full pl-8 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
            </div>

            <button id="startBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50">
                Start Transaction
            </button>

            <!-- Status box – now shows session details + cancel button -->
            <div id="statusBox" class="mt-5 hidden">
                <div id="statusBadge" class="flex items-center gap-2 px-4 py-3 rounded-lg border">
                    <svg id="statusIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span id="statusText" class="text-sm font-medium">Transaction Ready</span>
                </div>

                <div class="mt-3 text-xs text-slate-400 space-y-1">
                    <p><span class="font-medium text-slate-500">Session ID:</span> <span id="sessionIdDisplay" class="font-mono"></span></p>
                    <p><span class="font-medium text-slate-500">Checkout URL:</span> <span id="checkoutUrlDisplay" class="break-all"></span></p>
                </div>

                <!-- Cancel button – only visible when status is "active" -->
                <button id="cancelBtn"
                class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg transition disabled:opacity-50 hidden">
                Cancel Transaction
            </button>
        </div>

        <p id="errorBox" class="mt-4 text-sm text-red-600 hidden"></p>
    </div>

    <!-- Monthly summary card -->
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-200">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-lg font-bold text-slate-800">This Month</h2>
            <span id="summaryMonthLabel" class="text-xs text-slate-400 font-medium"></span>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
                <p class="text-xs font-medium text-emerald-700 mb-1">Received</p>
                <p id="summaryReceivedAmount" class="text-2xl font-bold text-emerald-700">R 0.00</p>
                <p id="summaryReceivedCount" class="text-xs text-emerald-600 mt-1">0 transactions</p>
            </div>
            <div class="bg-slate-100 border border-slate-200 rounded-xl p-4">
                <p class="text-xs font-medium text-slate-500 mb-1">Didn't go through</p>
                <p id="summaryExpiredAmount" class="text-2xl font-bold text-slate-500">R 0.00</p>
                <p id="summaryExpiredCount" class="text-xs text-slate-400 mt-1">0 expired</p>
            </div>
        </div>
    </div>

    <!-- Transaction history card -->
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-slate-200">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-slate-800">Transaction History</h2>
            <button id="refreshHistoryBtn" class="text-xs text-indigo-600 hover:text-indigo-800 font-medium">Refresh</button>
        </div>

        <div id="historyLoading" class="text-sm text-slate-400 py-6 text-center">Loading transactions...</div>
        <div id="historyEmpty" class="hidden text-sm text-slate-400 py-6 text-center">No transactions yet — start one above.</div>
        <div id="historyError" class="hidden text-sm text-red-600 py-4"></div>

        <div id="historyTableWrap" class="hidden overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="text-left text-slate-400 border-b border-slate-100">
                        <th class="py-2 font-medium">Date</th>
                        <th class="py-2 font-medium">Amount</th>
                        <th class="py-2 font-medium">Status</th>
                        <th class="py-2 font-medium">Reference</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>

</div>

<script>
    const SUPABASE_URL = "https://yosmaldrbxjtzhhwyuyy.supabase.co";
    const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlvc21hbGRyYnhqdHpoaHd5dXl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1MjE0MjQsImV4cCI6MjA5ODA5NzQyNH0.nrlBqnNvCikinoiOswy31f6Ctqp_-1e_l0Yi_1zrQRk";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- DOM refs ---
    const loginView = document.getElementById("loginView");
    const dashboardView = document.getElementById("dashboardView");
    const emailInput = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const loginError = document.getElementById("loginError");
    const logoutBtn = document.getElementById("logoutBtn");

    const amountInput = document.getElementById("amountInput");
    const startBtn = document.getElementById("startBtn");
    const statusBox = document.getElementById("statusBox");
    const errorBox = document.getElementById("errorBox");
    const sessionIdDisplay = document.getElementById("sessionIdDisplay");
    const checkoutUrlDisplay = document.getElementById("checkoutUrlDisplay");
    const statusBadge = document.getElementById("statusBadge");
    const statusIcon = document.getElementById("statusIcon");
    const statusText = document.getElementById("statusText");
    const cancelBtn = document.getElementById("cancelBtn");

    const refreshHistoryBtn = document.getElementById("refreshHistoryBtn");
    const historyLoading = document.getElementById("historyLoading");
    const historyEmpty = document.getElementById("historyEmpty");
    const historyError = document.getElementById("historyError");
    const historyTableWrap = document.getElementById("historyTableWrap");
    const historyTableBody = document.getElementById("historyTableBody");

    const summaryMonthLabel = document.getElementById("summaryMonthLabel");
    const summaryReceivedAmount = document.getElementById("summaryReceivedAmount");
    const summaryReceivedCount = document.getElementById("summaryReceivedCount");
    const summaryExpiredAmount = document.getElementById("summaryExpiredAmount");
    const summaryExpiredCount = document.getElementById("summaryExpiredCount");

    let currentMerchantId = null;

    // --- Track the current active session ---
    let currentSessionId = null;
    let currentSessionStatus = null;

    // --- Status badge styling ---
    function statusBadgeStyle(status) {
        const styles = {
            paid: "bg-emerald-50 text-emerald-700 border-emerald-200",
            active: "bg-amber-50 text-amber-700 border-amber-200",
            expired: "bg-slate-100 text-slate-500 border-slate-200",
            pending: "bg-slate-100 text-slate-500 border-slate-200",
        };
        return styles[status] || styles.pending;
    }

    function statusIconPath(status) {
        const paths = {
            paid: "M5 13l4 4L19 7",
            active: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z",
            expired: "M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z",
            pending: "M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z",
        };
        return paths[status] || paths.pending;
    }

    function statusLabel(status) {
        const labels = {
            paid: "Paid ✅",
            active: "Active ⏳",
            expired: "Expired ❌",
            pending: "Pending",
        };
        return labels[status] || status;
    }

    function statusBadge(status) {
        const style = statusBadgeStyle(status);
        return `<span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium border ${style}">${status}</span>`;
    }

    function formatDate(iso) {
        const d = new Date(iso);
        return d.toLocaleDateString("en-ZA", { day: "2-digit", month: "short" }) +
            " " + d.toLocaleTimeString("en-ZA", { hour: "2-digit", minute: "2-digit" });
    }

    function formatAmount(amount) {
        return "R " + Number(amount).toLocaleString("en-ZA", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // --- Update the status box UI based on session state ---
    function updateStatusUI(sessionId, status, amount) {
        if (!sessionId) {
            statusBox.classList.add("hidden");
            cancelBtn.classList.add("hidden");
            return;
        }

        currentSessionId = sessionId;
        currentSessionStatus = status;

        // Show the box
        statusBox.classList.remove("hidden");

        // Session ID
        sessionIdDisplay.textContent = sessionId;

        // Checkout URL
        const checkoutUrl = `${window.location.origin}/checkout.html?m=${currentMerchantId}&s=${sessionId}`;
        checkoutUrlDisplay.textContent = checkoutUrl;

        // Status badge styling
        const style = statusBadgeStyle(status);
        statusBadge.className = `flex items-center gap-2 px-4 py-3 rounded-lg border ${style}`;

        // Icon
        const iconPath = statusIconPath(status);
        statusIcon.innerHTML =
            `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${iconPath}" />`;

        // Label
        statusText.textContent = statusLabel(status);

        // Cancel button: only show if status is "active"
        if (status === "active") {
            cancelBtn.classList.remove("hidden");
            cancelBtn.disabled = false;
        } else {
            cancelBtn.classList.add("hidden");
            cancelBtn.disabled = true;
        }
    }

    // --- Cancel the current active transaction ---
    async function cancelTransaction() {
        if (!currentSessionId || currentSessionStatus !== "active") {
            return;
        }

        // Disable button & show loading state
        cancelBtn.disabled = true;
        cancelBtn.textContent = "Cancelling...";

        try {
            const { error } = await supabaseClient
                .from("sessions")
                .update({ status: "expired" })
                .eq("id", currentSessionId)
                .eq("merchant_id", currentMerchantId);

            if (error) {
                console.error("Cancel error:", error);
                errorBox.textContent = "Failed to cancel transaction: " + error.message;
                errorBox.classList.remove("hidden");
                cancelBtn.disabled = false;
                cancelBtn.textContent = "Cancel Transaction";
                return;
            }

            // Update local state
            currentSessionStatus = "expired";
            updateStatusUI(currentSessionId, "expired");

            // Refresh history & summary
            await loadHistory();
            await loadMonthlySummary();

            // Show a brief success message in the error box (green)
            errorBox.className = "mt-4 text-sm text-emerald-600";
            errorBox.textContent = "✅ Transaction cancelled successfully.";
            errorBox.classList.remove("hidden");

            // Auto-hide the success message after 4 seconds
            setTimeout(() => {
                errorBox.classList.add("hidden");
                errorBox.className = "mt-4 text-sm text-red-600 hidden";
            }, 4000);

        } catch (err) {
            console.error("Cancel exception:", err);
            errorBox.textContent = "An unexpected error occurred.";
            errorBox.classList.remove("hidden");
        } finally {
            cancelBtn.disabled = false;
            cancelBtn.textContent = "Cancel Transaction";
        }
    }

    // --- Load monthly summary via RPC ---
    async function loadMonthlySummary() {
        summaryMonthLabel.textContent = new Date().toLocaleDateString("en-ZA", { month: "long", year: "numeric" });

        const { data, error } = await supabaseClient
            .rpc("get_monthly_summary", { p_merchant_id: currentMerchantId });

        if (error || !data || data.length === 0) {
            summaryReceivedAmount.textContent = "—";
            summaryExpiredAmount.textContent = "—";
            return;
        }

        const row = data[0];
        summaryReceivedAmount.textContent = formatAmount(row.paid_total);
        summaryReceivedCount.textContent = `${row.paid_count} transaction${row.paid_count === 1 ? "" : "s"}`;
        summaryExpiredAmount.textContent = formatAmount(row.expired_total);
        summaryExpiredCount.textContent = `${row.expired_count} expired`;
    }

    // --- Load transaction history ---
    async function loadHistory() {
        historyLoading.classList.remove("hidden");
        historyEmpty.classList.add("hidden");
        historyError.classList.add("hidden");
        historyTableWrap.classList.add("hidden");

        const { data: sessions, error } = await supabaseClient
            .from("sessions")
            .select("id, amount, status, paystack_reference, created_at")
            .eq("merchant_id", currentMerchantId)
            .order("created_at", { ascending: false })
            .limit(50);

        historyLoading.classList.add("hidden");

        if (error) {
            historyError.textContent = "Failed to load transactions: " + error.message;
            historyError.classList.remove("hidden");
            return;
        }

        if (!sessions || sessions.length === 0) {
            historyEmpty.classList.remove("hidden");
            return;
        }

        historyTableBody.innerHTML = sessions.map(s => `
              <tr class="border-b border-slate-50">
                <td class="py-3 text-slate-600">${formatDate(s.created_at)}</td>
                <td class="py-3 font-medium text-slate-800">${formatAmount(s.amount)}</td>
                <td class="py-3">${statusBadge(s.status)}</td>
                <td class="py-3 text-slate-400 text-xs">${s.paystack_reference || "—"}</td>
              </tr>
            `).join("");

        historyTableWrap.classList.remove("hidden");
    }

    // --- Check session on load ---
    async function checkSession() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            await loadMerchant();
        }
    }

    // --- Load merchant record ---
    async function loadMerchant() {
        const { data: { user } } = await supabaseClient.auth.getUser();

        const { data: merchant, error } = await supabaseClient
            .from("merchants")
            .select("id, name")
            .eq("owner_id", user.id)
            .single();

        if (error || !merchant) {
            loginError.textContent = "Logged in, but no merchant record found for this account.";
            loginError.classList.remove("hidden");
            await supabaseClient.auth.signOut();
            return;
        }

        currentMerchantId = merchant.id;
        loginView.classList.add("hidden");
        dashboardView.classList.remove("hidden");

        // Clear any stale session state
        currentSessionId = null;
        currentSessionStatus = null;
        statusBox.classList.add("hidden");
        cancelBtn.classList.add("hidden");

        await loadHistory();
        await loadMonthlySummary();
    }

    // --- Login ---
    loginBtn.addEventListener("click", async () => {
        loginError.classList.add("hidden");
        loginBtn.disabled = true;
        loginBtn.textContent = "Logging in...";

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: emailInput.value,
            password: passwordInput.value,
        });

        loginBtn.disabled = false;
        loginBtn.textContent = "Log In";

        if (error) {
            loginError.textContent = error.message;
            loginError.classList.remove("hidden");
            return;
        }

        await loadMerchant();
    });

    // --- Logout ---
    logoutBtn.addEventListener("click", async () => {
        await supabaseClient.auth.signOut();
        currentMerchantId = null;
        currentSessionId = null;
        currentSessionStatus = null;
        dashboardView.classList.add("hidden");
        loginView.classList.remove("hidden");
        emailInput.value = "";
        passwordInput.value = "";
        statusBox.classList.add("hidden");
        cancelBtn.classList.add("hidden");
    });

    // --- Start transaction ---
    startBtn.addEventListener("click", async () => {
        const amount = parseFloat(amountInput.value);
        errorBox.classList.add("hidden");
        statusBox.classList.add("hidden");
        cancelBtn.classList.add("hidden");

        if (!amount || amount <= 0) {
            errorBox.textContent = "Please enter a valid amount.";
            errorBox.classList.remove("hidden");
            return;
        }

        startBtn.disabled = true;
        startBtn.textContent = "Creating session...";

        const { data, error } = await supabaseClient
            .from("sessions")
            .insert({
                merchant_id: currentMerchantId,
                amount: amount,
                status: "active",
            })
            .select()
            .single();

        startBtn.disabled = false;
        startBtn.textContent = "Start Transaction";

        if (error) {
            errorBox.textContent = "Failed to create session: " + error.message;
            errorBox.classList.remove("hidden");
            return;
        }

        // Update the UI with the new session
        updateStatusUI(data.id, "active", data.amount);

        // Refresh history and summary
        await loadHistory();
        await loadMonthlySummary();

        // Clear any old error messages
        errorBox.classList.add("hidden");
        errorBox.className = "mt-4 text-sm text-red-600 hidden";
    });

    // --- Cancel button handler ---
    cancelBtn.addEventListener("click", cancelTransaction);

    // --- Refresh ---
    refreshHistoryBtn.addEventListener("click", () => {
        loadHistory();
        loadMonthlySummary();
    });

    // --- Kick off ---
    checkSession();
</script>
</body>
</html>
